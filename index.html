<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDock | Night Shift Asset Hub</title>
    
    <!-- Prism.js for Professional Luau Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-base: #05070a;
            --bg-card: rgba(15, 20, 30, 0.85);
            --accent-neon: #4da3ff;
            --accent-glow: rgba(77, 163, 255, 0.3);
            --verified-gold: #ffb700;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ff3333;
            --success: #22c55e;
        }

        /* --- 🌌 THE HORROR ATMOSPHERE (Night Shift.Breakdown) --- */
        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(77, 163, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glitch/Noise Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 10;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* --- 🧭 NAVIGATION --- */
        nav {
            background: rgba(5, 7, 10, 0.95);
            backdrop-filter: blur(15px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(77, 163, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo {
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--accent-neon);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- 🛡️ VERIFICATION & BADGES --- */
        .badge {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(255, 183, 0, 0.1);
            color: var(--verified-gold);
            border: 1px solid var(--verified-gold);
            box-shadow: 0 0 8px rgba(255, 183, 0, 0.2);
        }

        /* --- 📋 ASSET GRID & CARDS --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 20;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--accent-neon);
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }

        .thumb {
            height: 220px;
            background: #000;
            position: relative;
            border-bottom: 1px solid rgba(77, 163, 255, 0.1);
        }

        .thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 25px;
        }

        /* --- 🪟 THE MULTI-MODAL SYSTEM --- */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5000;
            backdrop-filter: blur(5px);
        }

        .modal-large {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 1600px;
            height: 90vh;
            background: var(--bg-base);
            border: 1px solid rgba(77, 163, 255, 0.3);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* Premium Lock Blur */
        .premium-lock {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            text-align: center;
            padding: 20px;
        }

        /* --- ⌨️ CODE STYLING --- */
        pre[class*="language-"] {
            margin: 20px 0 !important;
            padding: 20px !important;
            border-radius: 12px !important;
            background: #010204 !important;
            border: 1px solid #1a1a1a !important;
            max-height: 500px;
            font-size: 0.9rem;
        }

        /* --- 🔘 BUTTONS & INPUTS --- */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(30, 41, 59, 0.5);
            color: var(--text-dim);
        }

        .btn:hover { border-color: var(--accent-neon); color: white; }
        .btn-active { border-color: var(--accent-neon); color: white; background: rgba(77, 163, 255, 0.1); }
        .btn-primary { background: var(--accent-neon); color: black; border: none; }
        .btn-delete { background: rgba(255, 51, 51, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        input, select, textarea {
            background: #0a0c10;
            border: 1px solid #222;
            color: white;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: var(--accent-neon); }

        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-neon);
            color: black;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            z-index: 10000;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        #toast.show { visibility: visible; animation: slideUp 0.3s forwards; }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
    </style>
</head>
<body>

<div id="toast">✅ CODE COPIED TO STUDIO CLIPBOARD</div>

<nav>
    <div class="logo">DEVDOCK_</div>
    <div style="display:flex; gap:20px; align-items:center;">
        <span id="userStatus" style="font-size: 0.85rem; color: var(--text-dim);">Guest Mode</span>
        <button class="btn" id="ownerToggle" onclick="toggleOwnerMode()">[ Manage ]</button>
        <button class="btn btn-primary" onclick="openModal('uploadModal')">+ Upload Asset</button>
    </div>
</nav>

<div class="container">
    <div class="controls">
        <div style="display:flex; gap:12px;">
            <button class="btn btn-active" onclick="setCategory('All', this)">All Assets</button>
            <button class="btn" onclick="setCategory('Scripts', this)">Luau Scripts</button>
            <button class="btn" onclick="setCategory('UI', this)">UI Kits</button>
        </div>
        <input type="text" id="assetSearch" placeholder="Search LaggyPotato's assets..." onkeyup="renderGrid()" style="width:400px; margin:0;">
    </div>

    <div id="assetGrid" class="grid"></div>
</div>

<!-- SCRIPT VIEW MODAL (EXPANDED) -->
<div class="overlay" id="viewModal">
    <div class="modal-large">
        <!-- Media & Comments Section -->
        <div style="width: 55%; background: #000; border-right: 1px solid #1a1a1a; display:flex; flex-direction:column;">
            <div id="viewMedia" style="height:65%; display:flex; align-items:center; justify-content:center; background:#000;"></div>
            <div style="flex-grow:1; padding:30px; background:rgba(5,7,10,0.9); overflow-y:auto; border-top:1px solid #111;">
                <h3 style="margin-top:0">Community Feedback</h3>
                <div style="display:flex; gap:12px; margin-bottom:25px;">
                    <input type="text" id="commentInput" placeholder="Add a comment..." style="margin:0;">
                    <button class="btn btn-primary" onclick="postComment()">Post</button>
                </div>
                <div id="commentContainer"></div>
            </div>
        </div>

        <!-- Details & Code Section -->
        <div style="width: 45%; padding: 45px; overflow-y:auto; position:relative;">
            <div id="lockOverlay" class="premium-lock" style="display:none;">
                <h1 style="color:var(--verified-gold); margin-bottom:10px;">★ PREMIUM SCRIPT ★</h1>
                <p style="color:var(--text-dim); margin-bottom:30px;">This asset is restricted to <span class="badge">Verified</span> developers.<br>Link your Discord or Roblox account to unlock.</p>
                <button class="btn btn-primary" style="background:var(--verified-gold); padding:15px 40px;" onclick="simulateAuth()">Link Account & Unlock</button>
            </div>

            <h1 id="viewTitle" style="margin:0; font-size:2rem;"></h1>
            <p id="viewMeta" style="color:var(--text-dim); margin:15px 0 25px 0; font-size:0.9rem;"></p>
            
            <div style="background:#010204; border-radius:12px; position:relative;">
                <pre><code id="viewCode" class="language-lua"></code></pre>
            </div>

            <button class="btn btn-primary" style="width:100%; padding:18px; font-size:1.1rem; margin-top:20px;" onclick="copyToClipboard()">Copy to Roblox Studio</button>
            <button class="btn" style="width:100%; margin-top:15px; border:none;" onclick="closeModals()">Return to Hub</button>
        </div>
    </div>
</div>

<!-- UPLOAD MODAL (EXPANDED) -->
<div class="overlay" id="uploadModal">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--bg-card); padding:50px; border-radius:24px; width:500px; border:1px solid var(--accent-neon);">
        <h2 style="margin-top:0">Publish New Asset</h2>
        <label style="font-size:0.8rem; color:var(--text-dim);">Asset Title</label>
        <input type="text" id="uTitle" placeholder="e.g., Round System Controller">
        
        <div style="display:flex; gap:15px;">
            <div style="flex:1;">
                <label style="font-size:0.8rem; color:var(--text-dim);">Category</label>
                <select id="uCat"><option>Scripts</option><option>UI</option></select>
            </div>
            <div style="flex:1;">
                <label style="font-size:0.8rem; color:var(--text-dim);">Access Type</label>
                <select id="uType"><option value="Free">Free</option><option value="Premium">Premium</option></select>
            </div>
        </div>

        <label style="font-size:0.8rem; color:var(--text-dim);">Video Showcase (Direct MP4 Link)</label>
        <input type="text" id="uVid" placeholder="https://example.com/demo.mp4">
        
        <label style="font-size:0.8rem; color:var(--text-dim);">Luau Source Code</label>
        <textarea id="uCode" placeholder="Paste your script here..." style="height:150px;"></textarea>
        
        <button class="btn btn-primary" style="width:100%; padding:15px;" onclick="processUpload()">Publish Asset</button>
        <button class="btn" style="width:100%; margin-top:10px; border:none;" onclick="closeModals()">Cancel</button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>

<script>
    // --- GLOBAL STATE ---
    let ownerMode = false;
    let isVerified = false;
    let activeAssetId = null;
    let selectedCategory = 'All';

    // --- INITIALIZATION ---
    function toggleOwnerMode() {
        ownerMode = !ownerMode;
        document.getElementById('ownerToggle').classList.toggle('btn-active');
        renderGrid();
    }

    function simulateAuth() {
        isVerified = !isVerified;
        document.getElementById('userStatus').innerHTML = isVerified ? 
            'LaggyPotato <span class="badge">Verified</span>' : 'Guest Mode';
        renderGrid();
        if(activeAssetId) openAssetView(activeAssetId);
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
    
    function setCategory(cat, btn) {
        selectedCategory = cat;
        document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('btn-active'));
        btn.classList.add('btn-active');
        renderGrid();
    }

    // --- CORE LOGIC ---
    function processUpload() {
        const title = document.getElementById('uTitle').value;
        const code = document.getElementById('uCode').value;
        if(!title || !code) return alert("Title and Code are required!");

        const asset = {
            id: Date.now(),
            title: title,
            cat: document.getElementById('uCat').value,
            type: document.getElementById('uType').value,
            vid: document.getElementById('uVid').value,
            code: code,
            author: "LaggyPotato",
            stats: { views: 0, copies: 0 },
            comments: []
        };

        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");
        database.unshift(asset);
        localStorage.setItem('devdock_master_db', JSON.stringify(database));
        
        closeModals();
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('assetGrid');
        const searchTerm = document.getElementById('assetSearch').value.toLowerCase();
        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");

        grid.innerHTML = database.filter(item => {
            const matchesCat = (selectedCategory === 'All' || item.cat === selectedCategory);
            const matchesSearch = item.title.toLowerCase().includes(searchTerm);
            return matchesCat && matchesSearch;
        }).map(item => `
            <div class="card" onclick="openAssetView(${item.id})">
                ${ownerMode ? `<button class="btn btn-delete" style="position:absolute; top:15px; right:15px; z-index:100;" onclick="deleteAsset(${item.id}, event)">DELETE</button>` : ''}
                <div class="thumb">
                    ${item.vid ? `<video src="${item.vid}" muted autoplay loop></video>` : '<div style="height:100%; background:radial-gradient(#111, #000);"></div>'}
                </div>
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <h3 style="margin:0">${item.title}</h3>
                        ${item.type === 'Premium' ? '<span class="badge" style="border-color:var(--verified-gold); color:var(--verified-gold)">Premium</span>' : ''}
                    </div>
                    <p style="font-size:0.8rem; color:var(--text-dim); margin:10px 0;">By ${item.author}</p>
                    <div style="display:flex; gap:20px; font-size:0.75rem; color:var(--text-dim); margin-top:20px;">
                        <span>👁️ ${item.stats.views} Views</span>
                        <span>📋 ${item.stats.copies} Copies</span>
                        <span>💬 ${item.comments.length} Comments</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openAssetView(id) {
        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");
        const asset = database.find(a => a.id == id);
        activeAssetId = id;

        // Increment Views
        asset.stats.views++;
        localStorage.setItem('devdock_master_db', JSON.stringify(database));

        document.getElementById('viewTitle').innerText = asset.title;
        document.getElementById('viewMeta').innerText = `${asset.cat} Asset • Created by ${asset.author} • ${asset.stats.copies} Copies Published`;
        
        // Media
        document.getElementById('viewMedia').innerHTML = asset.vid ? 
            `<video src="${asset.vid}" controls autoplay loop style="max-width:100%; max-height:100%;"></video>` : 
            '<h2 style="color:#222">NO PREVIEW VIDEO</h2>';

        // Code & Lock
        const codeElement = document.getElementById('viewCode');
        codeElement.textContent = asset.code;
        Prism.highlightElement(codeElement);
        
        document.getElementById('lockOverlay').style.display = (asset.type === 'Premium' && !isVerified) ? 'flex' : 'none';

        renderComments(asset.comments);
        openModal('viewModal');
        renderGrid();
    }

    function copyToClipboard() {
        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");
        const asset = database.find(a => a.id == activeAssetId);
        
        navigator.clipboard.writeText(asset.code);
        asset.stats.copies++;
        localStorage.setItem('devdock_master_db', JSON.stringify(database));

        const toast = document.getElementById('toast');
        toast.className = "show";
        setTimeout(() => toast.className = "", 3000);
        renderGrid();
    }

    function postComment() {
        const text = document.getElementById('commentInput').value;
        if(!text) return;

        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");
        const asset = database.find(a => a.id == activeAssetId);
        
        asset.comments.unshift({
            user: isVerified ? "LaggyPotato" : "Guest_User",
            text: text,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem('devdock_master_db', JSON.stringify(database));
        renderComments(asset.comments);
        document.getElementById('commentInput').value = '';
        renderGrid();
    }

    function renderComments(list) {
        document.getElementById('commentContainer').innerHTML = list.map(c => `
            <div style="margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid #111;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <b style="color:var(--accent-neon); font-size:0.9rem;">${c.user}</b>
                    <span style="font-size:0.7rem; color:var(--text-dim);">${c.date}</span>
                </div>
                <div style="font-size:0.85rem; color:var(--text-main);">${c.text}</div>
            </div>
        `).join('');
    }

    function deleteAsset(id, e) {
        e.stopPropagation();
        if(!confirm("Permanently delete this asset from the hub?")) return;
        
        let database = JSON.parse(localStorage.getItem('devdock_master_db') || "[]");
        database = database.filter(a => a.id != id);
        localStorage.setItem('devdock_master_db', JSON.stringify(database));
        renderGrid();
    }

    // Run on load
    renderGrid();
</script>

</body>
</html>
